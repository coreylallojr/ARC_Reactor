<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#80eeff;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#00d4ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0080bb;stop-opacity:0.4"/>
    </radialGradient>
    <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#001428;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="200" cy="195" r="160" fill="url(#ringGrad)"/>

  <!-- Outer decorative ring -->
  <circle cx="200" cy="195" r="155" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 6"/>

  <!-- Main outer ring -->
  <circle cx="200" cy="195" r="145" fill="none" stroke="#00d4ff" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Tick marks on outer ring -->
  <g stroke="#00d4ff" stroke-width="1.5" opacity="0.6">
    <!-- 12 tick marks every 30 degrees -->
    <line x1="200" y1="52" x2="200" y2="66" transform="rotate(0 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="59" transform="rotate(30 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="59" transform="rotate(60 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="66" transform="rotate(90 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="59" transform="rotate(120 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="59" transform="rotate(150 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="66" transform="rotate(180 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="59" transform="rotate(210 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="59" transform="rotate(240 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="66" transform="rotate(270 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="59" transform="rotate(300 200 195)"/>
    <line x1="200" y1="52" x2="200" y2="59" transform="rotate(330 200 195)"/>
  </g>

  <!-- Second ring -->
  <circle cx="200" cy="195" r="118" fill="none" stroke="#0094cc" stroke-width="1.5" opacity="0.7"/>

  <!-- Inner geometric segments — arc reactor style hexagonal -->
  <g fill="none" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)">
    <!-- 6 triangular segments pointing inward, rotated -->
    <polygon points="200,105 230,155 170,155" opacity="0.5" transform="rotate(0 200 195)"/>
    <polygon points="200,105 230,155 170,155" opacity="0.5" transform="rotate(60 200 195)"/>
    <polygon points="200,105 230,155 170,155" opacity="0.5" transform="rotate(120 200 195)"/>
    <polygon points="200,105 230,155 170,155" opacity="0.5" transform="rotate(180 200 195)"/>
    <polygon points="200,105 230,155 170,155" opacity="0.5" transform="rotate(240 200 195)"/>
    <polygon points="200,105 230,155 170,155" opacity="0.5" transform="rotate(300 200 195)"/>
  </g>

  <!-- Middle ring -->
  <circle cx="200" cy="195" r="68" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>

  <!-- Inner ring -->
  <circle cx="200" cy="195" r="42" fill="none" stroke="#00c8f0" stroke-width="1.5"/>

  <!-- Spoke lines -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.5">
    <line x1="200" y1="127" x2="200" y2="153" transform="rotate(0 200 195)"/>
    <line x1="200" y1="127" x2="200" y2="153" transform="rotate(60 200 195)"/>
    <line x1="200" y1="127" x2="200" y2="153" transform="rotate(120 200 195)"/>
    <line x1="200" y1="127" x2="200" y2="153" transform="rotate(180 200 195)"/>
    <line x1="200" y1="127" x2="200" y2="153" transform="rotate(240 200 195)"/>
    <line x1="200" y1="127" x2="200" y2="153" transform="rotate(300 200 195)"/>
  </g>

  <!-- Core glow -->
  <circle cx="200" cy="195" r="30" fill="url(#coreGrad)" filter="url(#softglow)" opacity="0.9"/>
  <circle cx="200" cy="195" r="18" fill="#00d4ff" opacity="0.95" filter="url(#glow)"/>
  <circle cx="200" cy="195" r="8" fill="#e0f8ff"/>

  <!-- STARK INDUSTRIES wordmark -->
  <text x="200" y="380"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="700"
    font-stretch="expanded"
    letter-spacing="8"
    fill="#00d4ff"
    text-anchor="middle"
    filter="url(#glow)">STARK</text>
  <text x="200" y="405"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="6"
    fill="#0094cc"
    text-anchor="middle"
    opacity="0.8">INDUSTRIES</text>
</svg>
